<div class="swatch-card">
    <div class="swatch-box" style="background:{hex};"></div>
    <div style="flex:1">
        <div class="hex">{hex}</div>
        <div class="meta">{rgb_str} &nbsp;·&nbsp; {percentage}% of image</div>
        <div class="pct-bar-bg">
            <div class="pct-bar-fill" style="width:{bar_width}%;background:{hex};"></div>
        </div>
    </div>
    <div style="font-size:0.7rem;color:#bbb;">#{rank}</div>
</div>
